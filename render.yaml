services:
  - type: web
    name: saas-subscription-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: "SaaS Subscriptions"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: saas-subscription-backend
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: require
      - key: DB_HOST
        fromDatabase:
          name: saas-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: saas-db
          property: database
      - key: DB_PGSQL_DATABASE
        fromDatabase:
          name: saas-db
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: saas-db
          property: connectionString
      - key: DB_USERNAME
        value: app_user
      - key: DB_PASSWORD
        generateValue: true
      - key: DB_MIGRATE_USERNAME
        value: migrate_user
      - key: DB_MIGRATE_PASSWORD
        generateValue: true
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: APP_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: SANCTUM_EXPIRATION
        value: "1440"

databases:
  - name: saas-db
    plan: free
    databaseName: saas_subscriptions