services:
  - type: web
    name: saas-subscription-backend
    runtime: php
    plan: free
    buildCommand: chmod +x ./build.sh && ./build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /api/v1/health

    envVars:
      - key: APP_NAME
        value: "SaaS Subscriptions"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: saas-subscription-backend
          property: host

      # DB — Render injects DATABASE_URL automatically from the linked DB
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: saas-subscription-db
          property: database
      - key: DB_HOST
        fromDatabase:
          name: saas-subscription-db
          property: host
      - key: DB_USERNAME
        value: app_user
      - key: DB_PASSWORD
        generateValue: true          # Render generates a random password
      - key: DB_PGSQL_DATABASE
        fromDatabase:
          name: saas-subscription-db
          property: database
      - key: DB_MIGRATE_USERNAME
        value: migrate_user
      - key: DB_MIGRATE_PASSWORD
        generateValue: true
      - key: DATABASE_URL           # superuser URL for role bootstrap in build.sh
        fromDatabase:
          name: saas-subscription-db
          property: connectionString

      # Sessions / Cache / Queue — use DB on free tier (no Redis)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync                  # sync = jobs run inline, no worker needed

      # Security
      - key: APP_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: SANCTUM_EXPIRATION
        value: "1440"

      - key: DB_SSLMODE
        value: require

databases:
  - name: saas-subscription-db
    plan: free
    databaseName: saas_subscriptions
    user: postgres                   # superuser — only used in build.sh for role setup